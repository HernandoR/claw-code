name: Crates Build

on:
  push:
    branches:
      - main
    paths:
      - 'rust/crates/**'
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - 'justfile'
      - '.github/workflows/crates-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'rust/crates/**'
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - 'justfile'
      - '.github/workflows/crates-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crates-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  crates-build:
    name: Build & check crates (via just)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run quality checks
        run: just check

      - name: Build release CLI
        run: just build-release
